<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wave Messenger</title>
  <link rel="icon" href="data:,"> <!-- Prevent favicon.ico request -->
  <!-- UI Libraries -->
  <!-- Pure Local UI (No External Fonts to avoids ERR_BLOCKED_BY_CLIENT) -->
  <script src="./vendor/tailwind.min.js"></script>
  
  <!-- Babel for Runtime JSX Transformation -->
  <script src="./vendor/babel.min.js"></script>

  <!-- UMD Libraries -->
  <script src="./vendor/react.min.js"></script>
  <script src="./vendor/react-dom.min.js"></script>
  <script src="./vendor/i18next.min.js"></script>
  <script src="./vendor/react-i18next.min.js"></script>
  <script src="./vendor/jsQR.js"></script>

  <link rel="stylesheet" href="./src/index.css">
  <style>
    /* Splash and Root specific fixes */
    #root {
      max-width: 450px;
      margin: 0 auto;
      box-shadow: 0 50px 100px -20px rgba(50, 50, 93, 0.25), 0 30px 60px -30px rgba(0, 0, 0, 0.3);
    }
    @media (max-width: 450px) {
      #root { max-width: 100%; height: 100vh; border-radius: 0; }
    }
  </style>

  <!-- Module resolution via explicit relative paths -->

  <script>
    // Suppress specific warnings from standalone libraries in "production-like" environments
    const originalWarn = console.warn;
    console.warn = function(...args) {
      if (args[0] && typeof args[0] === 'string') {
        if (args[0].includes('cdn.tailwindcss.com') || args[0].includes('in-browser Babel transformer')) {
          return;
        }
      }
      originalWarn.apply(console, args);
    };

    window.onerror = function(msg, url, line, col, error) {
      document.body.insertAdjacentHTML('afterbegin', '<div style="position:fixed;top:0;left:0;right:0;background:red;color:white;padding:10px;z-index:9999;font-size:12px;">RENDERER ERROR: ' + msg + '</div>');
      console.error("RENDERER ERROR:", msg, "at", url, ":", line);
      return false;
    };
    window.onunhandledrejection = function(event) {
      console.error("UNHANDLED REJECTION:", event.reason);
    };
    console.log("Wave Messenger: Renderer debug hooks installed.");
  </script>
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen overflow-hidden">
  <div id="root" class="w-full h-screen max-w-md bg-white shadow-2xl overflow-hidden flex flex-col relative">
    <!-- Splash Screen Overlay -->
    <div id="splash" class="absolute inset-0 z-50 bg-gradient-to-br from-green-400 via-blue-500 to-blue-700 flex flex-col items-center justify-center transition-opacity duration-1000 ease-in-out">
      <img src="./assets/icon.png" class="w-40 h-40 mb-8 transform hover:scale-105 transition-transform duration-500 drop-shadow-sm">
      <div class="text-center">
        <h1 class="text-white text-4xl font-black tracking-tighter mb-2">Wave Messenger</h1>
        <p class="text-white text-opacity-80 text-sm tracking-[0.3em] uppercase">Decentralized & Secure</p>
      </div>
      <div class="absolute bottom-12 text-white text-opacity-40 text-[10px] font-mono animate-pulse">
        CONNECTING TO PEERS...
      </div>
    </div>
  </div>

  <!-- Load Main Script with Babel -->
  <script type="text/babel" data-type="module" data-presets="react" src="./src/index.js"></script>
</body>
</html>
